name: Daily SEO Content Generator

on:
  schedule:
    - cron: '0 12 * * *' # Once a day at 12:00 UTC (approx 08:00/09:00 AM Chile)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          else
            pip install requests python-dotenv
          fi

      - name: Run content generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/daily_generator.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-generated High-Value SEO article & Orchestration: $(date +'%Y-%m-%d')" || exit 0
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" main
