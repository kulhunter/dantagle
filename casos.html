<!DOCTYPE html>
<html lang="es-CL" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo de Casos de Éxito | Dan Tagle</title>
    <meta name="description" content="19 casos reales de impacto: Ssangyong, Bupa, Tenpo, Midea y más. Soluciones de software y creatividad técnica.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #06b6d4; }
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; overflow-x: hidden; }
        .bg-mesh { background-image: radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.1) 0%, transparent 50%); }
        .glass-nav { background: rgba(5, 5, 5, 0.6); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .title-huge { font-size: clamp(3rem, 10vw, 8rem); font-weight: 900; letter-spacing: -0.05em; line-height: 0.85; }
        .case-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; overflow: hidden; transition: all 0.5s; }
        .case-card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(255,255,255,0.04); }
    </style>
</head>
<body class="bg-mesh">
    <nav class="fixed top-0 w-full z-50 glass-nav py-6 px-8 md:px-20 flex justify-between items-center">
        <a href="index.html" class="text-xl font-black tracking-tighter uppercase">DAN TAGLE <span class="text-cyan-500">.</span></a>
        <div class="hidden lg:flex gap-12 text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500">
            <a href="casos.html" class="text-white">Casos Reales</a>
            <a href="desarrollos.html" class="hover:text-white transition-all">Apps & Software</a>
            <a href="blog.html" class="hover:text-white transition-all">Blog</a>
        </div>
        <a href="https://wa.me/56930219665" class="text-[10px] font-black uppercase tracking-widest bg-white/10 px-6 py-3 rounded-md hover:bg-white hover:text-black transition-all">Agendar</a>
    </nav>

    <main class="pt-48 pb-20 px-8 md:px-20 container mx-auto">
        <header class="mb-32">
            <span class="text-[10px] font-mono text-cyan-500 tracking-[0.5em] uppercase mb-6 block">// ARCHIVO DE IMPACTO</span>
            <h1 class="title-huge uppercase mb-8">19 Casos <br> <span class="text-cyan-500">Reales.</span></h1>
            <p class="text-xl text-zinc-500 font-light max-w-3xl leading-relaxed">No vendo ideas abstractas. Vendo soluciones que ya han funcionado para las marcas más grandes de Chile y el mundo.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="casesContainer">
            <!-- Dynamic Content -->
        </div>
    </main>

    <footer class="py-24 px-8 md:px-20 border-t border-white/5 bg-zinc-900/20 mt-32 text-center">
        <h3 class="text-3xl font-black uppercase mb-8 italic">¿Tienes un problema similar?</h3>
        <a href="https://wa.me/56930219665" class="inline-block px-12 py-5 bg-white text-black font-black text-[10px] uppercase tracking-widest rounded-full hover:bg-cyan-500 transition-all">Resolvámoslo ahora</a>
    </footer>

    <script src="scripts/orchestrator_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('casesContainer');
            container.innerHTML = MASTER_DATA.cases.map(c => `
                <div class="case-card p-12 group">
                    <span class="text-[9px] font-black uppercase tracking-widest text-zinc-600 mb-4 block">${c.client}</span>
                    <h3 class="text-3xl font-black uppercase mb-8 group-hover:text-white transition-colors tracking-tighter leading-none">${c.title}</h3>
                    <div class="space-y-6 text-sm text-zinc-500 border-t border-white/5 pt-8">
                        <p><strong class="text-white text-[10px] uppercase tracking-widest block mb-1">Problema:</strong> ${c.prob}</p>
                        <p><strong class="text-white text-[10px] uppercase tracking-widest block mb-1">Solución:</strong> ${c.sol}</p>
                        <p><strong class="text-cyan-500 text-[10px] uppercase tracking-widest block mb-1">Resultado:</strong> ${c.res}</p>
                    </div>
                    <a href="${c.link}" target="_blank" class="mt-10 inline-block text-[9px] font-black uppercase tracking-widest border-b border-white pb-1 hover:text-cyan-500 transition-colors">Ver Case Study →</a>
                </div>
            `).join('');
            lucide.createIcons();
        });
    </script>
</body>
</html>
