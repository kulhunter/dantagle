<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Firmas de Correo | Dan Tagle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; }
        .bg-mesh { background-image: radial-gradient(circle at 50% 0%, rgba(6, 182, 212, 0.1) 0%, transparent 70%); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 1rem; padding: 1rem; width: 100%; outline: none; transition: all 0.3s; }
        input:focus { border-color: #06b6d4; background: rgba(255,255,255,0.08); }
        .signature-preview { background: white; color: black; padding: 2rem; border-radius: 1rem; }
    </style>
</head>
<body class="bg-mesh min-h-screen flex flex-col">
    <nav class="p-6 flex justify-between items-center">
        <a href="desarrollos.html" class="p-2 hover:bg-white/10 rounded-full transition-all"><i data-lucide="arrow-left" class="w-6 h-6"></i></a>
        <span class="text-[8px] font-black uppercase tracking-[0.4em] opacity-30">Firma v3.0</span>
        <div class="w-10"></div>
    </nav>

    <main class="flex-1 px-6 pb-20 container mx-auto max-w-4xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div>
                <header class="mb-12">
                    <span class="text-[10px] font-black uppercase tracking-[0.5em] text-cyan-500 mb-4 block">Corporate Branding Tool</span>
                    <h1 class="text-4xl font-black uppercase tracking-tighter">Generador <span class="text-white">de Firmas.</span></h1>
                </header>

                <div class="space-y-6">
                    <input type="text" id="name" placeholder="Nombre Completo" oninput="update()">
                    <input type="text" id="role" placeholder="Cargo / Rol" oninput="update()">
                    <input type="text" id="email" placeholder="Email" oninput="update()">
                    <input type="text" id="phone" placeholder="Teléfono" oninput="update()">
                </div>
            </div>

            <div>
                <span class="text-[8px] font-black uppercase tracking-widest text-zinc-500 mb-6 block">Previsualización</span>
                <div id="preview" class="signature-preview">
                    <table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, sans-serif;">
                        <tr>
                            <td style="padding-right: 20px; border-right: 2px solid #06b6d4;">
                                <img src="https://dantagle.cl/creativepool.png" width="60" style="border-radius: 50%;">
                            </td>
                            <td style="padding-left: 20px;">
                                <div id="pName" style="font-size: 18px; font-weight: bold; color: #000;">Tu Nombre</div>
                                <div id="pRole" style="font-size: 14px; color: #666; margin-bottom: 5px;">Tu Cargo</div>
                                <div id="pEmail" style="font-size: 12px; color: #06b6d4;">email@ejemplo.com</div>
                                <div id="pPhone" style="font-size: 12px; color: #999;">+56 9 1234 5678</div>
                            </td>
                        </tr>
                    </table>
                </div>
                <button onclick="copyHTML()" class="w-full mt-8 py-4 bg-white text-black font-black uppercase tracking-widest rounded-2xl hover:scale-105 transition-all">Copiar Firma HTML</button>
            </div>
        </div>
    </main>

    <!-- Discovery Section: Hub & Blog -->
    <section class="bg-zinc-900/40 py-24 px-6 border-t border-white/5">
        <div class="max-w-4xl mx-auto text-center md:text-left">
            <div class="mb-20">
                <span class="text-[10px] font-black uppercase tracking-[0.5em] text-cyan-500 mb-8 block">Hub de Herramientas</span>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <a href="boleta.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">Boleta</span></a>
                    <a href="sueldo.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">Sueldo</span></a>
                    <a href="iva.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">IVA</span></a>
                    <a href="uf.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UF</span></a>
                    <a href="calculadora-utm.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UTM</span></a>
                    <a href="ipc.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">IPC</span></a>
                    <a href="wa.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest text-emerald-500 group-hover:text-white">WA Link</span></a>
                    <a href="rut.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">RUT</span></a>
                </div>
            </div>
        </div>
    </section>

    <script>
        function update() {
            document.getElementById('pName').innerText = document.getElementById('name').value || 'Tu Nombre';
            document.getElementById('pRole').innerText = document.getElementById('role').value || 'Tu Cargo';
            document.getElementById('pEmail').innerText = document.getElementById('email').value || 'email@ejemplo.com';
            document.getElementById('pPhone').innerText = document.getElementById('phone').value || '+56 9 1234 5678';
        }
        function copyHTML() {
            const html = document.getElementById('preview').innerHTML;
            navigator.clipboard.writeText(html);
            const btn = event.target;
            btn.innerText = '¡Copiado!';
            setTimeout(() => btn.innerText = 'Copiar Firma HTML', 2000);
        }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
