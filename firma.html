<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Firma de Email | Branding Profesional | Dan Tagle</title>
    <meta name="description" content="Crea firmas de correo electrónico profesionales en HTML. Mejora tu branding personal y corporativo de forma gratuita.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.8rem; padding: 0.8rem; width: 100%; outline: none; color: white; font-size: 0.9rem; }
        .signature-preview { background: white; color: black; padding: 2rem; border-radius: 1rem; min-height: 150px; display: flex; align-items: center; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-5xl glass-panel p-10 md:p-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-4 uppercase tracking-widest">Email <span class="text-cyan-500">Signature.</span></h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Form -->
            <div class="space-y-4">
                <input type="text" id="name" placeholder="Tu Nombre" class="input-premium" oninput="update()">
                <input type="text" id="role" placeholder="Cargo (ej: CEO)" class="input-premium" oninput="update()">
                <input type="text" id="email" placeholder="email@empresa.com" class="input-premium" oninput="update()">
                <input type="text" id="phone" placeholder="+56 9 1234 5678" class="input-premium" oninput="update()">
                <input type="text" id="company" placeholder="Nombre Empresa" class="input-premium" oninput="update()">
            </div>

            <!-- Preview -->
            <div class="flex flex-col justify-center">
                <div id="signature" class="signature-preview mb-6">
                    <!-- Dynamic Signature -->
                </div>
                <button onclick="copyHTML()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest">Copiar Firma HTML</button>
            </div>
        </div>
    </div>
    <script>
        function update() {
            const name = document.getElementById('name').value || 'Nombre Apellido';
            const role = document.getElementById('role').value || 'Cargo';
            const email = document.getElementById('email').value || 'email@ejemplo.com';
            const phone = document.getElementById('phone').value || '+56 9 0000 0000';
            const company = document.getElementById('company').value || 'Empresa S.A.';
            
            const html = `
                <table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, sans-serif; color: #333;">
                    <tr>
                        <td style="padding-right: 20px; border-right: 2px solid #06b6d4;">
                            <div style="font-weight: bold; font-size: 18px; color: #000;">${name}</div>
                            <div style="font-size: 14px; color: #666;">${role} | ${company}</div>
                        </td>
                        <td style="padding-left: 20px;">
                            <div style="font-size: 12px; color: #666;">M: ${phone}</div>
                            <div style="font-size: 12px; color: #666;">E: <a href="mailto:${email}" style="color: #06b6d4; text-decoration: none;">${email}</a></div>
                            <div style="font-size: 12px; color: #000; font-weight: bold; margin-top: 5px;">dantagle.cl</div>
                        </td>
                    </tr>
                </table>
            `;
            document.getElementById('signature').innerHTML = html;
        }
        function copyHTML() {
            const html = document.getElementById('signature').innerHTML;
            navigator.clipboard.writeText(html);
            alert('¡Código HTML copiado! Pégalo en la configuración de tu correo.');
        }
        update();
    </script>
</body>
</html>
