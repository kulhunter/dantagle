<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Interés Compuesto | Dan Tagle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; }
        .bg-mesh { background-image: radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.1) 0%, transparent 70%); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 1rem; padding: 1.25rem; width: 100%; outline: none; transition: all 0.3s; }
        input:focus { border-color: #10b981; background: rgba(255,255,255,0.08); }
    </style>
</head>
<body class="bg-mesh min-h-screen flex flex-col">
    <nav class="p-6 flex justify-between items-center">
        <a href="desarrollos.html" class="p-2 hover:bg-white/10 rounded-full transition-all"><i data-lucide="arrow-left" class="w-6 h-6"></i></a>
        <span class="text-[8px] font-black uppercase tracking-[0.4em] opacity-30">Finance v3.0</span>
        <div class="w-10"></div>
    </nav>

    <main class="flex-1 px-6 pb-20 container mx-auto max-w-4xl">
        <header class="text-center mb-16">
            <span class="text-[10px] font-black uppercase tracking-[0.5em] text-emerald-500 mb-4 block">Capital Growth Tool</span>
            <h1 class="text-4xl font-black uppercase tracking-tighter">Interés <span class="text-white">Compuesto.</span></h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <div>
                    <label class="text-[8px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Inversión Inicial (CLP)</label>
                    <input type="number" id="principal" value="1000000" oninput="calculate()">
                </div>
                <div>
                    <label class="text-[8px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Tasa Anual (%)</label>
                    <input type="number" id="rate" value="10" step="0.1" oninput="calculate()">
                </div>
                <div>
                    <label class="text-[8px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Tiempo (Años)</label>
                    <input type="number" id="years" value="10" oninput="calculate()">
                </div>
            </div>

            <div class="flex flex-col justify-center items-center bg-white/5 border border-white/10 rounded-[2.5rem] p-12">
                <span class="text-[10px] font-black uppercase tracking-[0.5em] text-zinc-500 mb-4">Capital Final Estimado</span>
                <div id="result" class="text-5xl md:text-6xl font-black text-emerald-500 mb-4">$ 2.593.742</div>
                <p class="text-[10px] text-zinc-600 uppercase tracking-widest font-bold">Interés ganado: <span id="earned">$ 1.593.742</span></p>
            </div>
        </div>
    </main>

    <!-- Discovery Section: Hub & Blog -->
    <section class="bg-zinc-900/40 py-24 px-6 border-t border-white/5">
        <div class="max-w-4xl mx-auto">
            <div class="mb-20">
                <span class="text-[10px] font-black uppercase tracking-[0.5em] text-cyan-500 mb-8 block text-center md:text-left">Hub de Herramientas</span>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                    <a href="boleta.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">Boleta</span></a>
                    <a href="sueldo.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">Sueldo</span></a>
                    <a href="iva.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">IVA</span></a>
                    <a href="uf.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UF</span></a>
                    <a href="calculadora-utm.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UTM</span></a>
                    <a href="ipc.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">IPC</span></a>
                    <a href="wa.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest text-emerald-500 group-hover:text-white">WA Link</span></a>
                    <a href="rut.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group"><span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">RUT</span></a>
                </div>
            </div>
        </div>
    </section>

    <script>
        function calculate() {
            const p = parseFloat(document.getElementById('principal').value) || 0;
            const r = parseFloat(document.getElementById('rate').value) / 100 || 0;
            const t = parseFloat(document.getElementById('years').value) || 0;

            const final = p * Math.pow((1 + r), t);
            const earned = final - p;

            document.getElementById('result').innerText = '$ ' + Math.round(final).toLocaleString('es-CL');
            document.getElementById('earned').innerText = '$ ' + Math.round(earned).toLocaleString('es-CL');
        }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
