<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Interés Compuesto | Dan Tagle</title>
    <meta name="description" content="Proyecta tus ahorros e inversiones con nuestra calculadora de interés compuesto. Simple, visual y efectiva.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.8rem; padding: 0.8rem; width: 100%; outline: none; color: white; font-size: 1.2rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-2xl glass-panel p-10 md:p-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-4 uppercase tracking-tighter">Interés <span class="text-violet-500">Compuesto.</span></h1>
        </header>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Capital Inicial ($)</label>
                <input type="number" id="capital" value="1000000" class="input-premium" oninput="calculate()">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Aporte Mensual ($)</label>
                <input type="number" id="aporte" value="50000" class="input-premium" oninput="calculate()">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Tasa Anual (%)</label>
                <input type="number" id="tasa" value="10" class="input-premium" oninput="calculate()">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 block">Años</label>
                <input type="number" id="anios" value="10" class="input-premium" oninput="calculate()">
            </div>
        </div>
        <div class="pt-10 border-t border-white/5 text-center">
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-4">Monto Final Proyectado</span>
            <span id="resultado" class="text-5xl font-black text-white">$ 0</span>
        </div>
    </div>
    <script>
        function calculate() {
            const P = parseFloat(document.getElementById('capital').value) || 0;
            const PMT = parseFloat(document.getElementById('aporte').value) || 0;
            const r = (parseFloat(document.getElementById('tasa').value) || 0) / 100 / 12;
            const n = (parseFloat(document.getElementById('anios').value) || 0) * 12;
            
            // Formula: FV = P(1+r)^n + PMT * [((1+r)^n - 1) / r]
            let fv;
            if(r === 0) {
                fv = P + (PMT * n);
            } else {
                fv = P * Math.pow(1 + r, n) + PMT * ((Math.pow(1 + r, n) - 1) / r);
            }
            
            document.getElementById('resultado').innerText = '$ ' + Math.round(fv).toLocaleString('es-CL');
        }
        calculate();
    </script>
</body>
</html>
