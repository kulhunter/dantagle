<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IVA 19% Chile | Dan Tagle</title>
    <meta name="description" content="Calcula el IVA (19%) de forma rápida. Desglose de Neto, IVA y Total para facturas y boletas en Chile.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; width: 100%; outline: none; color: white; text-align: center; font-size: 1.5rem; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-xl glass-panel p-12">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-4 uppercase tracking-widest">Calculadora <span class="text-blue-500">IVA.</span></h1>
        </header>
        <div class="space-y-8">
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-4 block">Monto Neto ($)</label>
                <input type="number" id="neto" placeholder="0" class="input-premium" oninput="calculate('neto')">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-4 block">Monto Total ($)</label>
                <input type="number" id="total" placeholder="0" class="input-premium" oninput="calculate('total')">
            </div>
            
            <div class="pt-8 border-t border-white/5 grid grid-cols-2 gap-4 text-center">
                <div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-2">Solo IVA (19%)</span>
                    <span id="resIVA" class="text-2xl font-black text-blue-500">$ 0</span>
                </div>
                <div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-2">Total Final</span>
                    <span id="resTotal" class="text-2xl font-black text-white">$ 0</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calculate(source) {
            const netoIn = document.getElementById('neto');
            const totalIn = document.getElementById('total');
            const ivaDisplay = document.getElementById('resIVA');
            const totalDisplay = document.getElementById('resTotal');
            
            let neto, total, iva;
            if(source === 'neto') {
                neto = parseFloat(netoIn.value) || 0;
                iva = neto * 0.19;
                total = neto + iva;
                totalIn.value = Math.round(total);
            } else {
                total = parseFloat(totalIn.value) || 0;
                neto = total / 1.19;
                iva = total - neto;
                netoIn.value = Math.round(neto);
            }
            
            ivaDisplay.innerText = '$ ' + Math.round(iva).toLocaleString('es-CL');
            totalDisplay.innerText = '$ ' + Math.round(total).toLocaleString('es-CL');
        }
    </script>
</body>
</html>
