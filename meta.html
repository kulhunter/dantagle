<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Meta Tags SEO | Dan Tagle</title>
    <meta name="description" content="Analiza el SEO técnico de tu web. Revisa títulos, descripciones y etiquetas Open Graph en segundos de forma gratuita.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1.2rem; width: 100%; outline: none; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-4xl glass-panel p-10 md:p-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-4 uppercase tracking-widest">Meta <span class="text-cyan-500">Inspector.</span></h1>
            <p class="text-xs text-zinc-500 uppercase tracking-widest">Auditoría SEO Técnica Instantánea</p>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-16">
            <input type="text" id="url" placeholder="https://ejemplo.com" class="input-premium flex-1">
            <button onclick="analyze()" class="bg-cyan-500 hover:bg-white text-black font-black px-10 py-4 rounded-xl transition-all uppercase text-xs tracking-widest">Analizar</button>
        </div>

        <div id="results" class="hidden space-y-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-2">Title Tag</span>
                        <p id="res-title" class="text-lg font-bold text-white">--</p>
                    </div>
                    <div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-2">Meta Description</span>
                        <p id="res-desc" class="text-sm text-zinc-400 font-light leading-relaxed">--</p>
                    </div>
                </div>
                <div class="glass-panel p-6 border-white/5">
                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-4">OG Image Preview</span>
                    <img id="res-image" src="" class="w-full h-auto rounded-xl grayscale hover:grayscale-0 transition-all">
                </div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        async function analyze() {
            const url = document.getElementById('url').value.trim();
            if(!url) return;
            
            const results = document.getElementById('results');
            results.classList.remove('hidden');
            document.getElementById('res-title').innerText = 'Cargando...';
            
            try {
                const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.status === 'success') {
                    document.getElementById('res-title').innerText = data.data.title || 'Sin Título';
                    document.getElementById('res-desc').innerText = data.data.description || 'Sin Descripción';
                    document.getElementById('res-image').src = data.data.image ? data.data.image.url : '';
                }
            } catch(e) {
                alert('Error al analizar la URL');
            }
        }
    </script>
</body>
</html>
