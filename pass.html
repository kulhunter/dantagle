<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas Seguras | Gratis | Dan Tagle</title>
    <meta name="description" content="Genera contraseñas fuertes y seguras al instante. Protege tus cuentas con nuestra herramienta de ciberseguridad privada.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .pass-display { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 2rem; font-size: 2rem; font-weight: 900; text-align: center; font-family: monospace; letter-spacing: 0.1em; word-break: break-all; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-xl glass-panel p-10 md:p-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-4 uppercase tracking-widest">Password <span class="text-emerald-500">Secure.</span></h1>
        </header>
        <div id="password" class="pass-display mb-10 text-white">********</div>
        
        <div class="space-y-6 mb-10">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Longitud: <span id="len-val" class="text-white">16</span></span>
                <input type="range" id="length" min="8" max="64" value="16" class="w-2/3 accent-emerald-500" oninput="updateLen()">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center gap-3 text-[10px] font-black uppercase tracking-widest text-zinc-400 cursor-pointer">
                    <input type="checkbox" id="upper" checked onchange="generate()"> Mayúsculas
                </label>
                <label class="flex items-center gap-3 text-[10px] font-black uppercase tracking-widest text-zinc-400 cursor-pointer">
                    <input type="checkbox" id="numbers" checked onchange="generate()"> Números
                </label>
                <label class="flex items-center gap-3 text-[10px] font-black uppercase tracking-widest text-zinc-400 cursor-pointer">
                    <input type="checkbox" id="symbols" checked onchange="generate()"> Símbolos
                </label>
            </div>
        </div>

        <button onclick="generate()" class="w-full bg-emerald-500 hover:bg-white text-black font-black py-4 rounded-xl transition-all uppercase text-xs tracking-widest mb-4">Generar Nueva</button>
        <button onclick="copy()" class="w-full border border-white/10 hover:border-white text-zinc-500 hover:text-white font-black py-4 rounded-xl transition-all uppercase text-[10px] tracking-widest">Copiar Contraseña</button>
    </div>
    <script>
        function updateLen() {
            document.getElementById('len-val').innerText = document.getElementById('length').value;
            generate();
        }

        function generate() {
            const length = document.getElementById('length').value;
            const hasUpper = document.getElementById('upper').checked;
            const hasNumbers = document.getElementById('numbers').checked;
            const hasSymbols = document.getElementById('symbols').checked;
            
            let charset = "abcdefghijklmnopqrstuvwxyz";
            if(hasUpper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if(hasNumbers) charset += "0123456789";
            if(hasSymbols) charset += "!@#$%^&*()_+~`|}{[]:;?><,./-=";
            
            let password = "";
            for(let i = 0; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            document.getElementById('password').innerText = password;
        }

        function copy() {
            const pass = document.getElementById('password').innerText;
            navigator.clipboard.writeText(pass);
            alert('¡Copiada!');
        }
        generate();
    </script>
</body>
</html>
