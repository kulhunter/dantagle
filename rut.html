    <!-- Discovery Section: Hub & Blog -->

                    <a href="iva.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">

                    </a>
                    <a href="uf.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UF</span>
                    </a>
                    <a href="calculadora-utm.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UTM</span>
                    </a>
                    <a href="ipc.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">IPC</span>
                    </a>
                    <a href="wa.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">

                    </a>
                    <a href="rut.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">

                    </a>

            </div>

            <div>
                <span class="text-[10px] font-black uppercase tracking-[0.5em] text-zinc-500 mb-8 block">Pensamiento Estratégico</span>

    <script>
        function validate() {
            let value = document.getElementById('rut').value.replace(/\./g, '').replace(/-/g, '');
            if (value.length < 2) {
                document.getElementById('result').classList.add('hidden');
                return;
            }

            const body = value.slice(0, -1);
            const dv = value.slice(-1).toUpperCase();
            
            let sum = 0;
            let mul = 2;
            for (let i = body.length - 1; i >= 0; i--) {
                sum += body[i] * mul;
                mul = mul === 7 ? 2 : mul + 1;
            }
            
            const res = 11 - (sum % 11);
            const expectedDv = res === 11 ? '0' : res === 10 ? 'K' : res.toString();
            
            const isValid = dv === expectedDv;
            const resDiv = document.getElementById('result');
            const iconDiv = document.getElementById('statusIcon');
            const icon = document.getElementById('icon');
            const text = document.getElementById('statusText');

            resDiv.classList.remove('hidden');
            if (isValid) {
                iconDiv.className = "w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 bg-emerald-500";
                icon.setAttribute('data-lucide', 'check');
                text.innerText = "RUT VÁLIDO";
                text.className = "text-xl font-black uppercase tracking-widest text-emerald-500";
            } else {
                iconDiv.className = "w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 bg-rose-500";
                icon.setAttribute('data-lucide', 'x');
                text.innerText = "RUT INVÁLIDO";
                text.className = "text-xl font-black uppercase tracking-widest text-rose-500";
            }
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
