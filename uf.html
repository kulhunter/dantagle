<!DOCTYPE html>
<html lang="es-CL" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de UF a Pesos | Actualizado 2026 | Dan Tagle</title>
    <meta name="description" content="Convierte UF a pesos chilenos de forma instantánea. Herramienta gratuita para cálculos bancarios, inmobiliarios y comerciales.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; }
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; width: 100%; outline: none; color: white; text-align: center; font-size: 2rem; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-xl glass-panel p-12">
        <header class="text-center mb-10">
            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-emerald-500 mb-4 block">Unidad de Fomento Chile</span>
            <h1 class="text-4xl font-black mb-4 uppercase tracking-tighter">Conversor <span class="text-emerald-500">UF.</span></h1>
        </header>
        <div class="space-y-8">
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-4 block">Valor UF Hoy ($)</label>
                <input type="number" id="valorUF" value="38500" class="input-premium" oninput="calculate()">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-4 block">Cantidad de UF</label>
                <input type="number" id="cantidad" placeholder="1" class="input-premium" oninput="calculate()">
            </div>
            <div class="pt-10 border-t border-white/5 text-center">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-600 block mb-4">Total en Pesos (CLP)</span>
                <span id="resultado" class="text-5xl font-black text-white">$ 0</span>
            </div>
        </div>
    </div>
    <script>
        function calculate() {
            const uf = parseFloat(document.getElementById('valorUF').value) || 0;
            const cant = parseFloat(document.getElementById('cantidad').value) || 0;
            const res = uf * cant;
            document.getElementById('resultado').innerText = '$ ' + Math.round(res).toLocaleString('es-CL');
        }
    </script>
</body>
</html>
