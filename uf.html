<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor UF a CLP Hoy | Dan Tagle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #fff; }
        .bg-mesh { background-image: radial-gradient(circle at 50% 0%, rgba(6, 182, 212, 0.15) 0%, transparent 70%); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .toggle-active { background: white; color: black; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-mesh min-h-screen flex flex-col">
    <nav class="p-6 flex justify-between items-center">
        <a href="desarrollos.html" class="p-2 hover:bg-white/10 rounded-full transition-all"><i data-lucide="arrow-left" class="w-6 h-6"></i></a>
        <div id="status" class="text-[8px] font-black uppercase tracking-[0.4em] bg-white/5 px-4 py-1 rounded-full border border-white/10">Obteniendo valor...</div>
        <div class="w-10"></div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-6 pb-20">
        <div class="w-full max-w-md text-center">
            <div class="inline-flex bg-white/5 p-1 rounded-2xl mb-12 border border-white/5">
                <button id="modeUF" onclick="setMode('uf')" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all toggle-active">UF a CLP</button>
                <button id="modeCLP" onclick="setMode('clp')" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">CLP a UF</button>
            </div>

            <div class="mb-16">
                <span id="inputLabel" class="text-[10px] font-black uppercase tracking-[0.3em] text-cyan-500 mb-4 block">Cantidad de UF</span>
                <div class="relative">
                    <input type="number" id="monto" placeholder="0" class="w-full bg-transparent text-6xl md:text-8xl font-black text-center border-none outline-none focus:ring-0 placeholder:text-white/5" oninput="calculate()">
                </div>
            </div>

            <div class="space-y-12">
                <div>
                    <span id="resultLabel" class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 mb-2 block">Monto en Pesos (CLP)</span>
                    <div id="resPrincipal" class="text-6xl font-black text-white">$ 0</div>
                </div>
                
                <div class="bg-white/5 p-6 rounded-2xl border border-white/5 inline-block">
                    <span class="text-[8px] font-black uppercase tracking-widest block mb-1 text-zinc-600">Valor UF Hoy</span>
                    <div id="ufValorActual" class="text-xl font-black text-cyan-500 loading">Cargando...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Discovery Section: Hub & Blog -->
    <section class="bg-zinc-900/40 py-24 px-6 border-t border-white/5">
        <div class="max-w-4xl mx-auto">
            <div class="mb-20">
                <span class="text-[10px] font-black uppercase tracking-[0.5em] text-cyan-500 mb-8 block">Hub de Herramientas</span>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <a href="boleta.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">Boleta</span>
                    </a>
                    <a href="sueldo.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">Sueldo</span>
                    </a>
                    <a href="iva.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">IVA</span>
                    </a>
                    <a href="uf.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UF</span>
                    </a>
                    <a href="calculadora-utm.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">UTM</span>
                    </a>
                    <a href="ipc.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">IPC</span>
                    </a>
                    <a href="wa.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white text-emerald-500">WA Link</span>
                    </a>
                    <a href="rut.html" class="bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-cyan-500 transition-all text-center group">
                        <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-white">RUT</span>
                    </a>
                </div>
            </div>

            <div>
                <span class="text-[10px] font-black uppercase tracking-[0.5em] text-zinc-500 mb-8 block">Pensamiento Estratégico</span>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <a href="blog/el-trafico-web-esta-muriendo-google.html" class="group">
                        <div class="rounded-3xl overflow-hidden aspect-video mb-6 grayscale group-hover:grayscale-0 transition-all duration-700">
                            <img src="https://media.licdn.com/dms/image/v2/D4D12AQEDpUKDnvs6Ng/article-cover_image-shrink_720_1280/B4DZwA1L94J0AI-/0/1769540472568?e=2147483647&v=beta&t=uUSY4PGmiwuRht_UCWoO2WzqoOuQYXilM3yAmbB8tRI" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-700">
                        </div>
                        <h4 class="text-lg font-black uppercase tracking-tighter group-hover:text-cyan-500 transition-colors leading-tight">El tráfico web está muriendo. Google no.</h4>
                    </a>
                    <a href="blog/el-cm-murio-orquestador-comunidades.html" class="group">
                        <div class="rounded-3xl overflow-hidden aspect-video mb-6 grayscale group-hover:grayscale-0 transition-all duration-700">
                            <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-700">
                        </div>
                        <h4 class="text-lg font-black uppercase tracking-tighter group-hover:text-cyan-500 transition-colors leading-tight">El CM Murió: Orquestador de Comunidades</h4>
                    </a>
                </div>
            </div>
            
            <div class="mt-20 pt-10 border-t border-white/5 flex justify-between items-center opacity-30">
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-600">© 2026 Dan Tagle</span>
                <a href="index.html" class="text-[9px] font-black uppercase tracking-widest hover:text-white transition-colors">Volver al Inicio</a>
            </div>
        </div>
    </section>

    <script>
        let mode = 'uf';
        let ufValue = 0;

        async function fetchUF() {
            try {
                const response = await fetch('https://mindicador.cl/api/uf');
                const data = await response.json();
                ufValue = data.serie[0].valor;
                document.getElementById('ufValorActual').innerText = '$ ' + ufValue.toLocaleString('es-CL');
                document.getElementById('ufValorActual').classList.remove('loading');
                document.getElementById('status').innerText = 'Actualizado: ' + new Date().toLocaleDateString('es-CL');
                calculate();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('status').innerText = 'Usando valor estimado';
                ufValue = 38520; // Fallback
                document.getElementById('ufValorActual').innerText = '$ ' + ufValue.toLocaleString('es-CL');
            }
        }

        function setMode(m) {
            mode = m;
            document.getElementById('modeUF').classList.toggle('toggle-active', m === 'uf');
            document.getElementById('modeCLP').classList.toggle('toggle-active', m === 'clp');
            document.getElementById('inputLabel').innerText = m === 'uf' ? 'Cantidad de UF' : 'Cantidad de Pesos (CLP)';
            document.getElementById('resultLabel').innerText = m === 'uf' ? 'Monto en Pesos (CLP)' : 'Cantidad de UF';
            calculate();
        }

        function calculate() {
            if (ufValue === 0) return;
            const val = parseFloat(document.getElementById('monto').value) || 0;
            
            if (mode === 'uf') {
                const res = Math.round(val * ufValue);
                document.getElementById('resPrincipal').innerText = '$ ' + res.toLocaleString('es-CL');
            } else {
                const res = (val / ufValue).toFixed(2);
                document.getElementById('resPrincipal').innerText = res + ' UF';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchUF();
        });
    </script>
</body>
</html>
