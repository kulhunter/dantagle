<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Enlaces UTM | Marketing Digital | Dan Tagle</title>
    <meta name="description" content="Crea etiquetas UTM para tus campañas de marketing digital. Herramienta rápida para trackeo en Google Analytics.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; width: 100%; outline: none; color: white; }
        .url-display { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); border-radius: 1rem; padding: 1.5rem; font-family: monospace; font-size: 0.8rem; word-break: break-all; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-2xl glass-panel p-10 md:p-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-4 uppercase tracking-widest">UTM <span class="text-orange-500">Builder.</span></h1>
        </header>
        <div class="space-y-6 mb-10">
            <input type="text" id="url" placeholder="https://tu-sitio.com" class="input-premium" oninput="build()">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="source" placeholder="Fuente (ej: facebook)" class="input-premium" oninput="build()">
                <input type="text" id="medium" placeholder="Medio (ej: cpc)" class="input-premium" oninput="build()">
                <input type="text" id="campaign" placeholder="Nombre Campaña" class="input-premium" oninput="build()">
                <input type="text" id="content" placeholder="Contenido (ej: banner_rojo)" class="input-premium" oninput="build()">
            </div>
        </div>
        <div class="url-display mb-8 text-zinc-400" id="result">Pega tu URL base para comenzar...</div>
        <button onclick="copy()" class="w-full bg-white text-black font-black py-4 rounded-xl transition-all uppercase text-xs tracking-widest">Copiar Enlace Trackeado</button>
    </div>
    <script>
        function build() {
            const base = document.getElementById('url').value.trim();
            const source = document.getElementById('source').value.trim();
            const medium = document.getElementById('medium').value.trim();
            const campaign = document.getElementById('campaign').value.trim();
            const content = document.getElementById('content').value.trim();
            
            if(!base) { document.getElementById('result').innerText = "Ingresa la URL base..."; return; }
            
            let url = new URL(base.startsWith('http') ? base : 'https://' + base);
            if(source) url.searchParams.set('utm_source', source);
            if(medium) url.searchParams.set('utm_medium', medium);
            if(campaign) url.searchParams.set('utm_campaign', campaign);
            if(content) url.searchParams.set('utm_content', content);
            
            document.getElementById('result').innerText = url.toString();
        }
        function copy() {
            const text = document.getElementById('result').innerText;
            if(text.startsWith('http')) {
                navigator.clipboard.writeText(text);
                alert('¡Copiado!');
            }
        }
    </script>
</body>
</html>
