<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Palabras y Caracteres SEO | Dan Tagle</title>
    <meta name="description" content="Cuenta palabras, caracteres y optimiza tus textos para SEO. Herramienta rápida, gratuita y sin publicidad.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #f4f4f5; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-premium { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1.5rem; width: 100%; outline: none; color: white; resize: none; min-height: 300px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-4xl glass-panel p-10 md:p-14">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-4 uppercase tracking-tighter">Contador <span class="text-cyan-500">SEO.</span></h1>
        </header>
        <textarea id="text" placeholder="Pega tu texto aquí..." class="input-premium mb-8" oninput="count()"></textarea>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
            <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Palabras</span>
                <span id="words" class="text-3xl font-black">0</span>
            </div>
            <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Caracteres</span>
                <span id="chars" class="text-3xl font-black">0</span>
            </div>
            <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Párrafos</span>
                <span id="paragraphs" class="text-3xl font-black">0</span>
            </div>
            <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500 block mb-2">Lectura (min)</span>
                <span id="time" class="text-3xl font-black">0</span>
            </div>
        </div>
    </div>
    <script>
        function count() {
            const text = document.getElementById('text').value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const chars = text.length;
            const paragraphs = text.trim() ? text.split(/\n\n+/).length : 0;
            const time = Math.ceil(words / 200);
            
            document.getElementById('words').innerText = words;
            document.getElementById('chars').innerText = chars;
            document.getElementById('paragraphs').innerText = paragraphs;
            document.getElementById('time').innerText = time;
        }
    </script>
</body>
</html>
